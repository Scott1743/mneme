# mneme — minimal dev/test config only.
#
# The user-facing deliverable is `dist/mneme-<version>.zip` — a plain zip
# archive of the skill directory. Unzip into `~/.claude/skills/mneme/` and
# the agent picks it up. No wheel, no `pip install mneme`, no setuptools,
# no entry points. This file exists ONLY so `pytest` finds the test
# paths and markers; it's not a build manifest.

[tool.pytest.ini_options]
testpaths = ["tests"]
# Skip network tests by default. Developers run all markers explicitly
# with `pytest -m ""`.
addopts = "-m 'not network and not l2'"
markers = [
    "unit: 单函数/单模块的纯逻辑测试,无外部 IO(离线,<1s)",
    "integration: 跨模块组合,仍进程内 + 无网络(离线,1-3s)",
    "release: 发布门禁 — 版本/漂移(离线,3-10s)",
    "docs: 文档冻结规则(离线,<1s)",
    "e2e: 从 CLI 到索引/搜索的端到端契约测试",
    "compat: 需要额外依赖或环境的兼容性测试",
    "l2: 守护 v3.3 持久化 L2 模式与独立缓存行为(离线,<1s)",
    "network: 需要访问 HuggingFace 下载模型(在线,30-90s;默认跳过)",
]
