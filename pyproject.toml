[project]
name = "mneme"
version = "1.0.0"
requires-python = ">=3.10"
dependencies = [
    "tomli_w>=1.0,<2",
]

[project.optional-dependencies]
dev = ["pytest>=7"]
validate = ["PyYAML>=6.0,<7"]
index = [
    "sqlite-vec>=0.1.9,<0.2",
    "fastembed>=0.8.0,<0.9",
]
toml10 = ["tomli>=2.0,<3"]
all = [
    "sqlite-vec>=0.1.9,<0.2",
    "fastembed>=0.8.0,<0.9",
    "PyYAML>=6.0,<7",
]

[project.scripts]
mneme = "mneme.cli:main"

[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
mneme = ["skill/SKILL*.md", "skill/references/*.md"]

[tool.pytest.ini_options]
testpaths = ["tests"]
