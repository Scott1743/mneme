name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: pytest fast (Python ${{ matrix.python }} on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # Mneme 2.0: Python 3.11–3.13 only. config.py requires 3.11+.
        # ubuntu-latest is x86_64; macos-latest is arm64.
        python: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install test runtime
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml
      - name: Show installed package versions
        run: |
          python -c "import sys; print(sys.version)"
          python -c "import yaml; print('PyYAML', yaml.__version__)" || true
          python -c "import mneme; print('mneme', mneme.__version__)"
      - name: Run pytest fast (skip network)
        # Default addopts applies `-m 'not network'`; we make it explicit
        # so a future addopts change does not silently pull network
        # tests into the matrix.
        run: python -m pytest -m "not network and not compat" --tb=short
      - name: Generate coverage XML (matrix-wide)
        # Coverage runs on every cell so we get per-Python-version
        # breakdowns in the artifact. No fail-under gate (observation only).
        if: always()
        run: |
          python -m coverage xml || true
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.python }}
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 7

  network:
    # Network-sensitive tests. Run on a single cell to avoid duplicating
    # model downloads across the matrix.
    name: pytest network (Python 3.12, ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml
      - name: Run network tests only
        env:
          MNEME_MODEL_CACHE: ${{ runner.temp }}/mneme-models
        # Override addopts to select only network tests.
        run: python -m pytest -m "network" -o addopts="" --tb=short
        # Network tests are allowed to skip (external corpus missing,
        # HuggingFace unreachable). They are NOT allowed to fail.
        continue-on-error: false
